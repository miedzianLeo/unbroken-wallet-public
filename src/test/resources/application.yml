spring:
  liquibase:
    enabled: false # CHANGE
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      bootstrap-servers: localhost:9092
      auto-offset-reset: latest # A question to the candidate, explain the difference and impact between earliest and latest
      enable-auto-commit: true  # same as above
      group-id: unbroken-wallet # same as above, what is the role of group-id
      properties:
        spring.json.trusted.packages: '*'
        spring.json.add.type.headers: false
